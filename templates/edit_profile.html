{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit Profile</title>
  <link rel="stylesheet" href="{% static 'css/style1.css' %}">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f4f4f4;
      margin: 0;
    }

    .edit-container {
      max-width: 600px;
      margin: 60px auto;
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    h2 {
      text-align: center;
      margin-bottom: 30px;
    }

    .profile-pic-preview {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    .profile-pic-preview img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #ccc;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    label {
      font-weight: 600;
      margin-bottom: 6px;
    }

    input[type="file"],
    textarea {
      font-family: inherit;
      font-size: 14px;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      width: 100%;
    }

    button {
      background-color: #0095f6;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    button:hover {
      background-color: #007edb;
    }

    .back-link {
      display: block;
      margin-top: 20px;
      text-align: center;
      color: #555;
      text-decoration: none;
    }

    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="edit-container">
    <h2>Edit Your Profile</h2>

    <div class="profile-pic-preview">
      <img src="{{ request.user.profile.profile_pic.url }}" alt="Current Profile Picture">
    </div>

    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}

      <div>
        <label for="id_profile_pic">Change Profile Picture</label>
        {{ form.profile_pic }}
      </div>

      <div>
        <label for="id_bio">Bio</label>
        {{ form.bio }}
      </div>

      <button type="submit">Save Changes</button>
    </form>

    <a href="{% url 'profile' %}" class="back-link">← Back to Profile</a>
  </div>
</body>
</html>
