{% extends 'home.html' %}
{% load static %}

{% block content %}

<h2>{{ category_name }}</h2>
<div class="products">
  {% for product in products %}
    <div class="product">
      <img src="{{ product.get_image_url }}" alt="{{ product.name }}">
      <p>{{ product.name }}</p>
      <p>Rs. {{ product.price }}</p>
    </div>
  {% empty %}
    <p>No products in this category.</p>
  {% endfor %}
</div>
{% endblock %}
