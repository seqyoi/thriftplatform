{% extends 'base.html' %}
{% block content %}
  <div style="text-align: center; padding: 40px;">
    <h1>Thank you for your order!</h1>
    <p>Your order has been placed successfully.</p>
    <p><strong>Order ID:</strong> {{ order.id }}</p>
    <p><strong>Status:</strong> {{ order.status }}</p>
    <p><strong>Receiver:</strong> {{ order.receiver_name }}</p>
    <a href="{% url 'purchased_orders' %}" style="margin-top: 20px; display: inline-block; background: #5a774e; color: white; padding: 10px 20px; border-radius: 4px; text-decoration: none;">Go to Purchased Orders</a>
  </div>
{% endblock %}
