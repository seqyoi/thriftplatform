{% extends 'home.html' %}
{% load static %}

{% block content %}
<style>
  .upload-container {
    max-width: 600px;
    margin: 60px auto;
    padding: 30px 40px;
    background: #ffffff;
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
    font-family: 'Segoe UI', sans-serif;
  }

  .upload-container h2 {
    text-align: center;
    margin-bottom: 25px;
    color: #333;
  }

  .upload-form label {
    font-weight: 600;
    margin-top: 15px;
    display: block;
    color: #333;
  }

  .upload-form input[type="text"],
  .upload-form input[type="number"],
  .upload-form input[type="file"],
  .upload-form textarea,
  .upload-form select {
    width: 100%;
    padding: 10px 12px;
    margin-top: 8px;
    border: 1px solid #ccc;
    border-radius: 8px;
    box-sizing: border-box;
    font-size: 15px;
  }

  .upload-form button {
    width: 100%;
    margin-top: 25px;
    padding: 12px;
    background-color: #4CAF50;
    color: white;
    font-size: 16px;
    font-weight: bold;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.3s ease;
  }

  .upload-form button:hover {
    background-color: #45a049;
  }

  .upload-note {
    font-size: 13px;
    color: #888;
    margin-top: 5px;
  }
</style>

<div class="upload-container">
  <h2>Sell a Product</h2>

  <form method="POST" enctype="multipart/form-data" class="upload-form">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit">Upload Product</button>
  </form>
</div>
{% endblock %}
