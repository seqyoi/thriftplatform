<!DOCTYPE html>
<html>
<head>
    <title>Thrifty Home</title>
</head>
<body>
    <h1>Welcome to Thrifty!</h1>

    <h2>🔥 Popular Products</h2>
    <ul>
      {% for product in popular_products %}
        <li>{{ product.name }} - {{ product.category }}</li>
      {% empty %}
        <li>No popular products found.</li>
      {% endfor %}
    </ul>

</body>
</html>
