{% load static %}
<!DOCTYPE html>
<html>
<head>
  <title>Set New Password</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
  <div class="center">
    <h2>Set Your New Password</h2>

    {% if validlink %}
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Reset Password</button>
      </form>
    {% else %}
      <p>The reset link is invalid, possibly because it has already been used or expired.</p>
    {% endif %}
  </div>
</body>
</html>
