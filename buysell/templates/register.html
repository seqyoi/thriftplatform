<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  {% if messages %}
  <ul class="messages">
    {% for message in messages %}
      <li class="{{ message.tags }}">{{ message }}</li>
    {% endfor %}
  </ul>
{% endif %}
  <div class="login-box">
    <form class="login-form" method="POST" action="{% url 'register' %}">
      {% csrf_token %}
      <div class="login-header">
        <header>Create Your Account</header>
      </div>

      <div class="input-box">
        <input
          type="text"
          class="input-field"
          name="fullname"
          placeholder="Enter your full name"
          required
          autocomplete="name"
        />
      </div>

      <div class="input-box">
        <input
          type="email"
          class="input-field"
          name="email"
          placeholder="Enter your email"
          required
          autocomplete="email"
        />
      </div>

      <div class="input-box">
        <input
          type="text"
          class="input-field"
          name="username"
          placeholder="Choose a username"
          required
          autocomplete="username"
        />
      </div>

      <div class="input-box">
        <input
          type="password"
          class="input-field"
          name="password"
          id="password"
          placeholder="Create a password"
          required
          autocomplete="new-password"
        />
      </div>

      <div class="input-submit">
        <button class="submit-btn" id="submit" type="submit">Register</button>
      </div>

      <div class="sign-up-link">
        <p>
          Already have an account?
          <a href="{% url 'login' %}">Login</a>
        </p>
      </div>
    </form>
  </div>
</body>
</html>
